services:
  mongo:
    image: mongo:8.2.6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/bestchoicepc?authSource=admin
      - MONGO_DATABASE=bestchoicepc
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=localhost,127.0.0.1,mongo
    volumes:
      - .:/app
      - telegram_session:/app/.telegram
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  sync-job:
    build:
      context: .
      target: sync
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/bestchoicepc?authSource=admin
      - MONGO_DATABASE=bestchoicepc
      - TELEGRAM_SESSION_PATH=/app/.telegram/session
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=localhost,127.0.0.1,mongo
    volumes:
      - .:/app
      - telegram_session:/app/.telegram
    command: ["python", "-m", "app.scripts.sync_daily_offers"]
    profiles: ["jobs"]

  enrich-job:
    build:
      context: .
      target: enrich
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/bestchoicepc?authSource=admin
      - MONGO_DATABASE=bestchoicepc
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - OPENROUTER_ENABLED=${OPENROUTER_ENABLED}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=localhost,127.0.0.1,mongo
    volumes:
      - .:/app
      - telegram_session:/app/.telegram
    command: ["python", "-m", "app.scripts.enrich_catalog_candidates"]
    profiles: ["jobs"]

  pipeline-job:
    build:
      context: .
      target: pipeline
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/bestchoicepc?authSource=admin
      - MONGO_DATABASE=bestchoicepc
      - TELEGRAM_SESSION_PATH=/app/.telegram/session
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - OPENROUTER_ENABLED=${OPENROUTER_ENABLED}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=localhost,127.0.0.1,mongo
    volumes:
      - .:/app
      - telegram_session:/app/.telegram
    command: ["python", "-m", "app.scripts.run_catalog_candidate_pipeline"]
    profiles: ["jobs"]

  telegram-login:
    build:
      context: .
      target: telegram-login
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/bestchoicepc?authSource=admin
      - MONGO_DATABASE=bestchoicepc
      - TELEGRAM_SESSION_PATH=/app/.telegram/session
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=localhost,127.0.0.1,mongo
    volumes:
      - .:/app
      - telegram_session:/app/.telegram
    command: ["python", "-m", "app.scripts.telegram_login"]
    profiles: ["ops"]

volumes:
  mongo_data:
  redis_data:
  telegram_session:
